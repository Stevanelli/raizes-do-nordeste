<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Painel administrativo com indicadores, campanhas, pedidos recentes e acompanhamento de privacidade." />
  <meta name="theme-color" content="#365e57" />
  <title>Raízes do Nordeste | Admin</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="admin">
  <header data-app-header></header>

  <main id="main-content" class="page">
    <section class="section-header">
      <p class="eyebrow">Painel gerencial</p>
      <h1>Visão operacional da rede e dos fluxos de atendimento</h1>
      <p>
        O painel consolida indicadores, campanhas, pedidos recentes e privacidade em uma visão central da operação.
      </p>
    </section>

    <section id="admin-stats" class="grid grid-four"></section>

    <section class="grid grid-two">
      <article id="admin-orders" class="panel"></article>

      <form id="campaign-form" class="panel form-grid">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Marketing</p>
            <h2>Criar campanha interna</h2>
          </div>
        </div>
        <label class="field">
          <span>Título da campanha</span>
          <input type="text" name="title" autocomplete="off" required />
        </label>
        <label class="field">
          <span>Descrição</span>
          <textarea name="description" rows="4" required></textarea>
        </label>
        <label class="field">
          <span>Unidade</span>
          <select name="unitId">
            <option value="all">Toda a rede</option>
          </select>
        </label>
        <label class="field">
          <span>Desconto (%)</span>
          <input type="number" name="discountRate" min="0" max="30" inputmode="decimal" value="10" required />
        </label>
        <label class="field">
          <span>Pedido mínimo (R$)</span>
          <input type="number" name="minimumOrder" min="0" inputmode="decimal" value="50" required />
        </label>
        <div class="form-actions">
          <button class="button button-primary" type="submit">Publicar campanha</button>
        </div>
      </form>
    </section>

    <section class="grid grid-two">
      <article id="privacy-panel" class="panel"></article>
      <aside id="admin-units" class="panel"></aside>
    </section>
  </main>

  <footer data-app-footer></footer>

  <script src="js/mock.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
