<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Acompanhe o status do pedido com timeline visual e resumo final da compra." />
  <meta name="theme-color" content="#365e57" />
  <title>Raízes do Nordeste | Pedido</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="pedido">
  <header data-app-header></header>

  <main id="main-content" class="page">
    <section class="section-header">
      <p class="eyebrow">Acompanhamento</p>
      <h1>Status do pedido em tempo real</h1>
      <p>
        Esta tela simula a evolução do pedido desde a aprovação do pagamento até a retirada ou entrega.
      </p>
    </section>

    <div id="order-empty" class="panel is-hidden">
      <h2>Nenhum pedido encontrado</h2>
      <p>Finalize um pagamento para visualizar o rastreio do pedido.</p>
      <a class="button button-primary" href="cardapio.html">Fazer um pedido</a>
    </div>

    <div id="order-content">
      <section id="order-hero" class="panel"></section>
      <section class="grid grid-two">
        <article id="order-timeline" class="panel"></article>
        <aside id="order-details" class="panel"></aside>
      </section>
    </div>
  </main>

  <footer data-app-footer></footer>

  <script src="js/mock.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pedido.js"></script>
</body>
</html>
