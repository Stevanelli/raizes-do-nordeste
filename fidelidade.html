<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Programa de fidelidade com pontos, recompensas, campanhas e histórico de relacionamento." />
  <meta name="theme-color" content="#365e57" />
  <title>Raízes do Nordeste | Fidelidade</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="fidelidade">
  <header data-app-header></header>

  <main id="main-content" class="page">
    <section class="section-header">
      <p class="eyebrow">Relacionamento</p>
      <h1>Programa de fidelidade com recompensas e campanhas</h1>
      <p>
        O cliente acompanha pontos, resgata benefícios e visualiza promoções ativas vinculadas ao histórico.
      </p>
    </section>

    <section id="loyalty-overview" class="panel"></section>

    <section class="panel">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Recompensas</p>
          <h2>Benefícios disponíveis</h2>
        </div>
      </div>
      <div id="rewards-grid" class="grid grid-three"></div>
    </section>

    <section class="grid grid-two">
      <article id="loyalty-history" class="panel"></article>
      <aside id="loyalty-campaigns" class="panel"></aside>
    </section>
  </main>

  <footer data-app-footer></footer>

  <script src="js/mock.js"></script>
  <script src="js/app.js"></script>
  <script src="js/fidelidade.js"></script>
</body>
</html>
